<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FC 풉살 데이터 센터</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f6; color: #2d3436; margin: 0; padding: 0; padding-bottom: 50px; }
        
        .header { background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%); color: white; padding: 30px 20px 40px 20px; text-align: center; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        .header h1 { margin: 0; font-size: 28px; font-weight: 900; letter-spacing: -0.5px; }
        .header p { margin: 5px 0 0 0; font-size: 14px; opacity: 0.8; }
        
        .admin-nav { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; }
        .admin-nav a { text-decoration: none; color: white; font-size: 11px; background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 12px; font-weight: bold; backdrop-filter: blur(5px); }

        .container { max-width: 1200px; margin: -25px auto 0 auto; padding: 0 15px; }

        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .card-title { font-size: 16px; font-weight: 800; color: #2d3748; margin-top: 0; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .latest-match { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; text-align: center; }
        .match-date { font-size: 12px; font-weight: bold; color: #718096; margin-bottom: 10px; }
        .score-board { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .team-name { font-size: 18px; font-weight: 900; width: 60px; }
        .team-a { color: #3182ce; }
        .team-b { color: #e53e3e; }
        .score { font-size: 32px; font-weight: 900; color: #1a202c; background: white; padding: 5px 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .vs { font-size: 16px; font-weight: bold; color: #a0aec0; }
        .match-footer { margin-top: 15px; font-size: 13px; font-weight: bold; color: #ecc94b; background: #fffbeb; padding: 8px; border-radius: 8px; display: inline-block; }

        /* 시너지 카드 */
        .synergy-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .synergy-card { padding: 20px; border-radius: 16px; color: white; display: flex; flex-direction: column; justify-content: flex-start; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .syn-duo { background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%); }
        .syn-nemesis { background: linear-gradient(135deg, #805ad5 0%, #553c9a 100%); }
        .syn-shield { background: linear-gradient(135deg, #38a169 0%, #276749 100%); }
        .syn-delivery { background: linear-gradient(135deg, #3182ce 0%, #2b6cb0 100%); }
        .syn-sad { background: linear-gradient(135deg, #718096 0%, #4a5568 100%); }
        
        .syn-icon { font-size: 24px; margin-bottom: 10px; }
        .syn-title { font-size: 14px; font-weight: bold; opacity: 0.9; margin-bottom: 5px; }
        .syn-players { font-size: 20px; font-weight: 900; margin-bottom: 10px; line-height: 1.2; }
        .syn-desc { font-size: 12px; background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; }
        
        /* [추가] 2~5위 리스트 스타일 */
        .syn-ranking-list { border-top: 1px solid rgba(255,255,255,0.2); padding-top: 12px; font-size: 12px; display: flex; flex-direction: column; gap: 6px; }
        .syn-rank-item { display: flex; justify-content: space-between; align-items: center; opacity: 0.85; }
        .syn-rank-num { font-weight: 900; width: 15px; opacity: 0.7; }
        .syn-rank-name { flex: 1; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .syn-rank-score { font-weight: bold; text-align: right; }

        /* 리더보드 */
        .table-container { overflow-x: auto; margin-top: 10px; border-radius: 12px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #edf2f7; font-size: 14px; }
        th { background: #f7fafc; color: #4a5568; font-weight: 800; font-size: 12px; white-space: nowrap; position: sticky; top: 0; z-index: 10; }
        td.player-name { font-weight: 800; color: #2d3748; text-align: left; padding-left: 15px; }
        
        .col-pts { font-weight: 900; color: #3182ce; background: rgba(49,130,206,0.05); }
        .col-winrate { font-weight: bold; color: #38a169; }
        .col-gd { font-weight: bold; } 
        
        .rank-badge { display: inline-block; width: 24px; height: 24px; line-height: 24px; border-radius: 50%; font-weight: 900; font-size: 12px; color: #718096; background: #edf2f7; }
        .rank-1 { background: #ecc94b; color: white; box-shadow: 0 2px 4px rgba(236,201,75,0.4); transform: scale(1.1); }
        .rank-2 { background: #a0aec0; color: white; }
        .rank-3 { background: #ed8936; color: white; }
        tr:hover { background: #f8fafc; }

        /* 비디오 */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .video-item { background: #1a202c; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .video-item:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
        .video-thumb { width: 100%; aspect-ratio: 16 / 9; background-size: cover; background-position: center; position: relative; }
        .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.6); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .video-info { padding: 12px; }
        .video-tag { display: inline-block; background: #e53e3e; color: white; font-size: 10px; font-weight: bold; padding: 3px 6px; border-radius: 4px; margin-bottom: 5px; }
        .video-title { color: white; font-size: 14px; font-weight: bold; line-height: 1.4; }

        .loading { text-align: center; padding: 40px; color: #a0aec0; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="admin-nav">
            <a href="game_entry.html">📝 현장 기입</a>
            <a href="admin_dashboard.html">⚙️ 관리자</a>
        </div>
        <h1>FC 풉살 데이터 센터</h1>
        <p>추억 보관소 (x) 기록 보관소 (o)</p>
    </div>

    <div class="container">
        <div class="card" style="margin-top: -30px; position: relative; z-index: 5;">
            <div class="card-title">📅 가장 최근 경기 하이라이트</div>
            <div id="latestMatchContainer" class="loading">데이터를 불러오는 중입니다...</div>
        </div>

        <div class="card" style="background: transparent; box-shadow: none; padding: 0;">
            <div class="card-title" style="padding-left: 5px;">🕵️‍♂️ 데이터 팩트 폭행 (Top 5 랭킹)</div>
            <div class="synergy-grid" id="synergyContainer">
                <div class="loading" style="color:#718096; padding:20px;">시너지 분석 중...</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🏆 2026 시즌 종합 스탯 랭킹</div>
            <p style="font-size: 12px; color: #718096; margin-top:-10px; margin-bottom:15px;">* 공격포인트(골+도움) 순으로 정렬됩니다.</p>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 50px;">순위</th>
                            <th style="text-align: left; padding-left: 15px;">선수명</th>
                            <th class="col-pts">공격P</th>
                            <th>⚽ 골</th>
                            <th>👟 도움</th>
                            <th>⛔ 실점</th>
                            <th class="col-gd">+/-</th>
                            <th>출전</th>
                            <th class="col-winrate">승률</th>
                            <th title="90분 환산 득점력">P90</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody">
                        <tr><td colspan="10" class="loading">스탯을 계산하고 있습니다...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📺 풉살 미디어 아카이브</div>
            <div class="video-grid" id="videoContainer"></div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://qjvuxwldlviknhiydoxw.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqdnV4d2xkbHZpa25oaXlkb3h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MDA0MDcsImV4cCI6MjA5MTI3NjQwN30.bOD8ciTRnSESfyzN9DJz3Ttz4u-V8ZEqehwSRdH1NtU';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        window.onload = () => {
            loadLatestMatch();
            loadDashboardData();
            loadVideos();
        };

        async function loadLatestMatch() {
            const { data, error } = await supabaseClient.from('games')
                .select('*, match_days(match_date, match_type, opponent), game_lineups(player_id, is_mom, players(name))')
                .order('created_at', { ascending: false }).limit(1);

            const container = document.getElementById('latestMatchContainer');
            if (error || data.length === 0) return container.innerHTML = '<div style="color:#a0aec0; padding:20px;">아직 등록된 경기가 없습니다.</div>';

            const game = data[0];
            const isFriendly = game.match_days.match_type === '교류전';
            const teamAName = isFriendly ? '우리팀' : 'A팀';
            const teamBName = isFriendly ? (game.match_days.opponent || '상대팀') : 'B팀';

            let momHtml = '';
            const momLineup = game.game_lineups.find(l => l.is_mom === true);
            if (momLineup && momLineup.players) {
                momHtml = `<div class="match-footer">⭐ 경기 최우수 선수(MOM) : ${momLineup.players.name}</div>`;
            } else if (game.team_a_rating === null) {
                momHtml = `<div class="match-footer" style="color:#a0aec0; background:#f7fafc;">코치진 평가를 기다리는 중입니다... ⏳</div>`;
            }

            container.innerHTML = `
                <div class="latest-match">
                    <div class="match-date">${game.match_days.match_date} | ${game.match_days.match_type} (${game.game_number}경기)</div>
                    <div class="score-board">
                        <div class="team-name team-a">${teamAName}</div>
                        <div class="score">${game.team_a_score}</div>
                        <div class="vs">VS</div>
                        <div class="score">${game.team_b_score}</div>
                        <div class="team-name team-b" style="color:${isFriendly ? '#718096' : '#e53e3e'}">${teamBName}</div>
                    </div>
                    ${momHtml}
                </div>
            `;
        }

        async function loadDashboardData() {
            const [playersRes, lineupsRes, goalsRes, gamesRes] = await Promise.all([
                supabaseClient.from('players').select('id, name, is_guest'),
                supabaseClient.from('game_lineups').select('player_id, game_id, team, is_mom'),
                supabaseClient.from('game_goals').select('scorer_id, assist_id, is_own_goal'),
                supabaseClient.from('games').select('id, duration_mins, team_a_score, team_b_score')
            ]);

            if (playersRes.error || lineupsRes.error || goalsRes.error || gamesRes.error) return;

            const playersMap = {};
            playersRes.data.forEach(p => playersMap[p.id] = p.name);

            const gamesMap = {};
            gamesRes.data.forEach(g => {
                gamesMap[g.id] = {
                    duration: g.duration_mins || 15,
                    scoreA: g.team_a_score || 0,
                    scoreB: g.team_b_score || 0,
                    winner: (g.team_a_score > g.team_b_score) ? 'A' : (g.team_b_score > g.team_a_score) ? 'B' : 'DRAW'
                };
            });

            const stats = {};
            playersRes.data.forEach(p => {
                stats[p.id] = { name: p.name, isGuest: p.is_guest, apps: 0, wins: 0, playTime: 0, goals: 0, assists: 0, conceded: 0 };
            });

            const gameTeams = {}; 
            lineupsRes.data.forEach(l => {
                const pStat = stats[l.player_id];
                const gameInfo = gamesMap[l.game_id];
                if (pStat && gameInfo) {
                    pStat.apps += 1;
                    pStat.playTime += gameInfo.duration;
                    if (gameInfo.winner === l.team) pStat.wins += 1;
                    const concededGoals = (l.team === 'A') ? gameInfo.scoreB : gameInfo.scoreA;
                    pStat.conceded += concededGoals;

                    if (!gameTeams[l.game_id]) gameTeams[l.game_id] = { A: [], B: [] };
                    if (gameTeams[l.game_id][l.team]) gameTeams[l.game_id][l.team].push(l.player_id);
                }
            });

            const assistDuos = {};
            goalsRes.data.forEach(g => {
                if (!g.is_own_goal && g.scorer_id && stats[g.scorer_id]) stats[g.scorer_id].goals += 1;
                if (g.assist_id && stats[g.assist_id]) {
                    stats[g.assist_id].assists += 1;
                    if (g.scorer_id) {
                        const pair = `${g.assist_id}|${g.scorer_id}`;
                        assistDuos[pair] = (assistDuos[pair] || 0) + 1;
                    }
                }
            });

            const duosObj = {};    
            const nemesisObj = {}; 

            for (const gameId in gameTeams) {
                const teamA = gameTeams[gameId].A || [];
                const teamB = gameTeams[gameId].B || [];
                const winner = gamesMap[gameId].winner;

                [teamA, teamB].forEach((team, idx) => {
                    const teamWinner = (idx === 0) ? 'A' : 'B';
                    for(let i=0; i<team.length; i++) {
                        for(let j=i+1; j<team.length; j++) {
                            const pair = [team[i], team[j]].sort().join('|');
                            if (!duosObj[pair]) duosObj[pair] = { games: 0, wins: 0 };
                            duosObj[pair].games++;
                            if(winner === teamWinner) duosObj[pair].wins++;
                        }
                    }
                });

                teamA.forEach(a => {
                    teamB.forEach(b => {
                        const pair1 = `${a}|${b}`, pair2 = `${b}|${a}`; 
                        if (!nemesisObj[pair1]) nemesisObj[pair1] = { games: 0, wins: 0 };
                        if (!nemesisObj[pair2]) nemesisObj[pair2] = { games: 0, wins: 0 };
                        nemesisObj[pair1].games++; nemesisObj[pair2].games++;
                        if (winner === 'A') nemesisObj[pair1].wins++;
                        else if (winner === 'B') nemesisObj[pair2].wins++;
                    });
                });
            }

            const minGames = 2;
            
            // 1. 배열로 변환 후 정렬
            let duoArr = [];
            for (const key in duosObj) {
                if (duosObj[key].games >= minGames) {
                    const [id1, id2] = key.split('|');
                    const rate = duosObj[key].wins / duosObj[key].games;
                    duoArr.push({ names: `${playersMap[id1]}&${playersMap[id2]}`, rate, desc: `${Math.round(rate*100)}% (${duosObj[key].games}전)` });
                }
            }
            duoArr.sort((a,b) => b.rate - a.rate);

            let nemArr = [];
            for (const key in nemesisObj) {
                if (nemesisObj[key].games >= minGames) {
                    const [wId, lId] = key.split('|');
                    const rate = nemesisObj[key].wins / nemesisObj[key].games;
                    nemArr.push({ names: `${playersMap[wId]} ⚔️ ${playersMap[lId]}`, rate, desc: `승률 ${Math.round(rate*100)}% (${nemesisObj[key].games}전)` });
                }
            }
            nemArr.sort((a,b) => b.rate - a.rate);

            let shieldArr = [];
            for (const key in stats) {
                if (stats[key].apps >= minGames) {
                    const avg = stats[key].conceded / stats[key].apps;
                    shieldArr.push({ names: stats[key].name, avg, desc: `${avg.toFixed(1)}골 (${stats[key].apps}전)` });
                }
            }
            shieldArr.sort((a,b) => a.avg - b.avg);

            let deliveryArr = [];
            for (const key in assistDuos) {
                const [aId, sId] = key.split('|');
                deliveryArr.push({ names: `${playersMap[aId]} ➡️ ${playersMap[sId]}`, goals: assistDuos[key], desc: `${assistDuos[key]}골` });
            }
            deliveryArr.sort((a,b) => b.goals - a.goals);

            let sadArr = [];
            const activePlayers = Object.values(stats).filter(s => s.apps >= minGames);
            if (activePlayers.length > 0) {
                const avgPts = activePlayers.reduce((sum, s) => sum + (s.goals + s.assists), 0) / activePlayers.length;
                activePlayers.forEach(s => {
                    const pts = s.goals + s.assists;
                    const winRate = s.apps > 0 ? (s.wins / s.apps) * 100 : 0;
                    if (pts >= avgPts) {
                        sadArr.push({ names: s.name, winRate, pts, desc: `승률 ${Math.round(winRate)}% (${pts}P)` });
                    }
                });
            }
            sadArr.sort((a,b) => a.winRate - b.winRate || b.pts - a.pts);

            // 카드 렌더링 헬퍼 함수
            function renderCard(title, icon, arr, cssClass, emptyMsg) {
                if (arr.length === 0) return `<div class="synergy-card ${cssClass}"><div><div class="syn-icon">${icon}</div><div class="syn-title">${title}</div><div class="syn-players">데이터 부족</div></div><div class="syn-desc">${emptyMsg}</div></div>`;
                
                let html = `<div class="synergy-card ${cssClass}">
                    <div>
                        <div class="syn-icon">${icon}</div>
                        <div class="syn-title">${title}</div>
                        <div class="syn-players">${arr[0].names}</div>
                        <div class="syn-desc">${arr[0].desc}</div>
                    </div>`;
                
                if (arr.length > 1) {
                    html += `<div class="syn-ranking-list">`;
                    for(let i=1; i<Math.min(5, arr.length); i++) {
                        html += `<div class="syn-rank-item"><span class="syn-rank-num">${i+1}</span><span class="syn-rank-name">${arr[i].names}</span><span class="syn-rank-score">${arr[i].desc}</span></div>`;
                    }
                    html += `</div>`;
                }
                html += `</div>`;
                return html;
            }

            document.getElementById('synergyContainer').innerHTML = `
                ${renderCard('승리 보증 수표', '🔥', duoArr, 'syn-duo', '최소 2경기 동반 출전 필요')}
                ${renderCard('로켓 배송 (합작)', '📦', deliveryArr, 'syn-delivery', '어시스트 기록 필요')}
                ${renderCard('국밥 수비수 (최소실점)', '🛡️', shieldArr, 'syn-shield', '최소 2경기 출전 필요')}
                ${renderCard('인간 상성 (천적)', '⚔️', nemArr, 'syn-nemesis', '적으로 2경기 이상 조우 필요')}
                ${renderCard('고통받는 에이스', '😭', sadArr, 'syn-sad', '포인트 상위권 데이터 필요')}
            `;

            // 리더보드 렌더링
            const statsArray = activePlayers.map(s => {
                const points = s.goals + s.assists;
                const gd = s.goals - s.conceded; 
                const winRate = s.apps > 0 ? Math.round((s.wins / s.apps) * 100) : 0;
                const p90 = s.playTime > 0 ? ((s.goals / s.playTime) * 90).toFixed(2) : "0.00";
                return { ...s, points, gd, winRate, p90 };
            });

            statsArray.sort((a, b) => {
                if (b.points !== a.points) return b.points - a.points;
                if (b.gd !== a.gd) return b.gd - a.gd; 
                if (b.goals !== a.goals) return b.goals - a.goals;
                if (b.winRate !== a.winRate) return b.winRate - a.winRate;
                return a.apps - b.apps;
            });

            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';

            statsArray.forEach((s, idx) => {
                const tr = document.createElement('tr');
                let rankClass = 'rank-badge';
                if(idx === 0) rankClass += ' rank-1';
                else if(idx === 1) rankClass += ' rank-2';
                else if(idx === 2) rankClass += ' rank-3';

                const gdColor = s.gd > 0 ? '#38a169' : (s.gd < 0 ? '#e53e3e' : '#718096');
                const gdText = s.gd > 0 ? `+${s.gd}` : s.gd;
                const guestTag = s.isGuest ? '<span style="font-size:10px; background:#f1c40f; padding:2px 4px; border-radius:4px; margin-left:5px;">용병</span>' : '';

                tr.innerHTML = `
                    <td><span class="${rankClass}">${idx + 1}</span></td>
                    <td class="player-name">${s.name}${guestTag}</td>
                    <td class="col-pts">${s.points}</td>
                    <td>${s.goals}</td>
                    <td>${s.assists}</td>
                    <td style="color:#e53e3e;">${s.conceded}</td>
                    <td class="col-gd" style="color:${gdColor}">${gdText}</td>
                    <td>${s.apps}</td>
                    <td class="col-winrate">${s.winRate}%</td>
                    <td style="color:#718096; font-size:12px;">${s.p90}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function loadVideos() {
            const { data, error } = await supabaseClient.from('videos').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('videoContainer');
            if (error || !data || data.length === 0) return container.innerHTML = '<div style="color:#a0aec0; grid-column: 1 / -1; text-align:center; padding:20px;">아직 등록된 영상이 없습니다.</div>';

            container.innerHTML = '';
            data.forEach(v => {
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                const match = v.youtube_url.match(regExp);
                const videoId = (match && match[2].length === 11) ? match[2] : null;
                const thumbUrl = videoId ? `https://img.youtube.com/vi/${videoId}/hqdefault.jpg` : 'https://via.placeholder.com/640x360?text=No+Thumbnail';

                const card = document.createElement('div');
                card.className = 'video-item';
                card.onclick = () => window.open(v.youtube_url, '_blank');
                card.innerHTML = `
                    <div class="video-thumb" style="background-image: url('${thumbUrl}');">
                        <div class="play-btn">▶</div>
                    </div>
                    <div class="video-info">
                        <span class="video-tag">${v.category}</span>
                        <div class="video-title">${v.title}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
