<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FC 풉살 선수 프로필</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f4f8; color: #1a202c; margin: 0; padding: 0; padding-bottom: 60px; }
        
        .top-nav { display: flex; align-items: center; padding: 15px 20px; color: white; position: absolute; top: 0; width: 100%; box-sizing: border-box; z-index: 10; }
        .back-btn { color: white; text-decoration: none; font-size: 24px; font-weight: bold; background: rgba(0,0,0,0.2); width: 36px; height: 36px; display: flex; justify-content: center; align-items: center; border-radius: 50%; backdrop-filter: blur(5px); }
        
        .hero { background: linear-gradient(135deg, #2b6cb0 0%, #2c5282 100%); padding: 60px 20px 40px 20px; text-align: center; color: white; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-shadow: 0 10px 20px rgba(43, 108, 176, 0.2); position: relative; overflow: hidden; }
        .hero::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%); pointer-events: none; }
        .profile-img-placeholder { width: 90px; height: 90px; background: white; border-radius: 50%; margin: 0 auto 15px auto; display: flex; justify-content: center; align-items: center; font-size: 36px; font-weight: 900; color: #2b6cb0; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 4px solid rgba(255,255,255,0.3); }
        .player-name { font-size: 32px; font-weight: 900; margin: 0 0 5px 0; letter-spacing: -1px; }
        .player-badges { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .badge { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.3); }

        .container { max-width: 800px; margin: -20px auto 0 auto; padding: 0 15px; position: relative; z-index: 5; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 15px 10px; border-radius: 16px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-val { font-size: 22px; font-weight: 900; color: #2d3748; margin-bottom: 2px; }
        .stat-label { font-size: 11px; font-weight: 800; color: #a0aec0; text-transform: uppercase; }

        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-title { font-size: 16px; font-weight: 900; color: #2d3748; margin-top: 0; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }

        .chart-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto; aspect-ratio: 1 / 1; }

        .relation-item { display: flex; align-items: center; padding: 12px; border-radius: 12px; background: #f8fafc; margin-bottom: 10px; border: 1px solid #edf2f7; }
        .relation-icon { font-size: 24px; margin-right: 15px; width: 30px; text-align: center; }
        .relation-info { flex: 1; }
        .relation-title { font-size: 11px; font-weight: bold; color: #a0aec0; margin-bottom: 2px; }
        .relation-target { font-size: 15px; font-weight: 900; color: #2d3748; }
        .relation-stat { font-size: 15px; font-weight: 900; text-align: right; }
        .stat-good { color: #38a169; }
        .stat-bad { color: #e53e3e; }
        .stat-neutral { color: #3182ce; }

        .timeline { position: relative; padding-left: 20px; margin-top: 10px; }
        .timeline::before { content: ''; position: absolute; top: 0; left: 6px; width: 2px; height: 100%; background: #e2e8f0; }
        .tl-item { position: relative; margin-bottom: 20px; }
        .tl-item:last-child { margin-bottom: 0; }
        .tl-dot { position: absolute; left: -21px; top: 4px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; z-index: 2; }
        .tl-dot.win { background: #38a169; }
        .tl-dot.loss { background: #e53e3e; }
        .tl-dot.draw { background: #a0aec0; }
        .tl-content { background: #f8fafc; padding: 12px 15px; border-radius: 12px; border: 1px solid #edf2f7; }
        .tl-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .tl-date { font-size: 11px; font-weight: bold; color: #a0aec0; }
        .tl-result { font-size: 12px; font-weight: 900; }
        .tl-score { font-size: 15px; font-weight: 900; color: #2d3748; margin-bottom: 5px; }
        .tl-perf { font-size: 13px; font-weight: bold; color: #3182ce; }
        .tl-badges { display: flex; gap: 5px; margin-top: 5px; }
        .tl-badge { font-size: 10px; background: #fffbeb; color: #d69e2e; padding: 2px 6px; border-radius: 4px; font-weight: bold; }

        .loading { text-align: center; padding: 50px 20px; color: #a0aec0; font-weight: bold; }
    </style>
</head>
<body>

    <div id="app">
        <div class="loading">선수 데이터를 분석하고 있습니다...</div>
    </div>

    <script>
        // ==========================================
        // Supabase 연동 (본인 키로 변경!)
        // ==========================================
        const supabaseUrl = 'https://qjvuxwldlviknhiydoxw.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqdnV4d2xkbHZpa25oaXlkb3h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MDA0MDcsImV4cCI6MjA5MTI3NjQwN30.bOD8ciTRnSESfyzN9DJz3Ttz4u-V8ZEqehwSRdH1NtU';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const playerName = urlParams.get('name');

            if (!playerName) {
                document.getElementById('app').innerHTML = '<div class="loading" style="color:#e53e3e;">선수 이름을 찾을 수 없습니다. 메인 페이지로 돌아가 다시 선택해주세요.</div>';
                return;
            }

            loadPlayerProfile(playerName);
        };

        async function loadPlayerProfile(targetName) {
            // 1. 데이터 가져오기
            const [playersRes, gamesRes, lineupsRes, goalsRes] = await Promise.all([
                supabaseClient.from('players').select('*'),
                supabaseClient.from('games').select('*, match_days(match_date, match_type, opponent)').order('created_at', { ascending: false }),
                supabaseClient.from('game_lineups').select('*'),
                supabaseClient.from('game_goals').select('*')
            ]);

            if (playersRes.error || gamesRes.error || lineupsRes.error || goalsRes.error) {
                return document.getElementById('app').innerHTML = '<div class="loading" style="color:#e53e3e;">데이터 로딩 중 오류가 발생했습니다.</div>';
            }

            // 🔥 gamesData 변수 할당 추가 (버그 해결 완료)
            const gamesData = gamesRes.data; 

            const targetPlayer = playersRes.data.find(p => p.name === targetName);
            if (!targetPlayer) {
                return document.getElementById('app').innerHTML = '<div class="loading" style="color:#e53e3e;">등록되지 않은 선수입니다.</div>';
            }
            
            const targetId = targetPlayer.id;
            const playersMap = {};
            playersRes.data.forEach(p => playersMap[p.id] = p.name);

            // 2. 전체 스탯 연산
            const stats = {};
            playersRes.data.forEach(p => {
                stats[p.id] = { id: p.id, name: p.name, apps: 0, wins: 0, losses: 0, playTime: 0, goals: 0, assists: 0, conceded: 0, mom: 0, mip: 0 };
            });

            const gameTeams = {}; 
            const myGames = []; 

            lineupsRes.data.forEach(l => {
                const pStat = stats[l.player_id];
                const game = gamesData.find(g => g.id === l.game_id);
                if (pStat && game) {
                    pStat.apps += 1;
                    pStat.playTime += (game.duration_mins || 15);
                    if (l.is_mom) pStat.mom += 1;
                    if (l.is_mip) pStat.mip += 1;
                    
                    const winner = (game.team_a_score > game.team_b_score) ? 'A' : (game.team_b_score > game.team_a_score) ? 'B' : 'DRAW';
                    if (winner === l.team) pStat.wins += 1;
                    else if (winner !== 'DRAW') pStat.losses += 1;
                    
                    pStat.conceded += (l.team === 'A') ? game.team_b_score : game.team_a_score;

                    if (!gameTeams[l.game_id]) gameTeams[l.game_id] = { A: [], B: [], winner: winner, game: game };
                    if (gameTeams[l.game_id][l.team]) gameTeams[l.game_id][l.team].push(l.player_id);

                    if (l.player_id === targetId) {
                        myGames.push({
                            gameInfo: game,
                            myTeam: l.team,
                            result: winner === 'DRAW' ? 'draw' : (winner === l.team ? 'win' : 'loss'),
                            isMom: l.is_mom,
                            isMip: l.is_mip,
                            myGoals: 0,
                            myAssists: 0
                        });
                    }
                }
            });

            goalsRes.data.forEach(g => {
                if (!g.is_own_goal && g.scorer_id && stats[g.scorer_id]) stats[g.scorer_id].goals += 1;
                if (g.assist_id && stats[g.assist_id]) stats[g.assist_id].assists += 1;

                if (g.scorer_id === targetId || g.assist_id === targetId) {
                    const myGame = myGames.find(mg => mg.gameInfo.id === g.game_id);
                    if (myGame) {
                        if (!g.is_own_goal && g.scorer_id === targetId) myGame.myGoals += 1;
                        if (g.assist_id === targetId) myGame.myAssists += 1;
                    }
                }
            });

            // 3. 내 스탯 계산
            const myStat = stats[targetId];
            if (myStat.apps === 0) {
                return document.getElementById('app').innerHTML = `
                    <div class="top-nav"><a href="index.html" class="back-btn">←</a></div>
                    <div class="loading" style="padding-top:100px;">아직 ${targetName} 선수의 출전 기록이 없습니다.</div>
                `;
            }

            const points = myStat.goals + myStat.assists;
            const winRate = Math.round((myStat.wins / myStat.apps) * 100);
            const p90 = myStat.playTime > 0 ? ((myStat.goals / myStat.playTime) * 90).toFixed(2) : "0.00";

            // 4. 육각형 차트 연산
            const totalTeamGames = gamesData.length; 
            function getScore(value, maxExpected) { return Math.min(100, Math.round((value / maxExpected) * 100)); }
            
            const scoreFinishing = getScore(myStat.goals / myStat.apps, 2.0);
            const scorePlaymaking = getScore(myStat.assists / myStat.apps, 1.5);
            const scoreWinning = winRate;
            const avgConc = myStat.conceded / myStat.apps;
            const scoreDefense = Math.max(0, 100 - (avgConc * 20)); 
            const scoreAttendance = getScore(myStat.apps, totalTeamGames);
            const starPower = (myStat.mom * 2 + myStat.mip) / myStat.apps; 
            const scoreStar = getScore(starPower, 0.5); 

            let badgesHtml = '';
            if (scoreFinishing >= 80) badgesHtml += '<span class="badge">🔥 골잡이</span>';
            if (scorePlaymaking >= 80) badgesHtml += '<span class="badge">🤝 패스마스터</span>';
            if (scoreDefense >= 80) badgesHtml += '<span class="badge">🛡️ 통곡의 벽</span>';
            if (myStat.mom >= 2) badgesHtml += '<span class="badge">⭐ 크랙</span>';
            if (winRate >= 60) badgesHtml += '<span class="badge">🍀 승리요정</span>';
            if (!badgesHtml) badgesHtml = '<span class="badge">🌱 성장중인 유망주</span>';

            // 5. 관계도
            const duoStats = {}; 
            const enemyStats = {}; 
            const assistStats = {}; 

            for (const gameId in gameTeams) {
                const teamA = gameTeams[gameId].A;
                const teamB = gameTeams[gameId].B;
                const winner = gameTeams[gameId].winner;

                let myTeamArr = null, enemyTeamArr = null, myTeamWinner = null;
                
                if (teamA.includes(targetId)) { myTeamArr = teamA; enemyTeamArr = teamB; myTeamWinner = 'A'; }
                else if (teamB.includes(targetId)) { myTeamArr = teamB; enemyTeamArr = teamA; myTeamWinner = 'B'; }

                if (myTeamArr) {
                    myTeamArr.forEach(id => {
                        if(id !== targetId) {
                            if(!duoStats[id]) duoStats[id] = { games:0, wins:0 };
                            duoStats[id].games++;
                            if (winner === myTeamWinner) duoStats[id].wins++;
                        }
                    });
                    enemyTeamArr.forEach(id => {
                        if(!enemyStats[id]) enemyStats[id] = { games:0, losses:0 };
                        enemyStats[id].games++;
                        if (winner !== myTeamWinner && winner !== 'DRAW') enemyStats[id].losses++;
                    });
                }
            }

            goalsRes.data.forEach(g => {
                if (g.scorer_id === targetId && g.assist_id) {
                    assistStats[g.assist_id] = (assistStats[g.assist_id] || 0) + 1; 
                }
                if (g.assist_id === targetId && g.scorer_id && !g.is_own_goal) {
                    assistStats[g.scorer_id] = (assistStats[g.scorer_id] || 0) + 1; 
                }
            });

            function getTopRelation(statsObj, isRate, rateKey, minGames = 2) {
                let best = null;
                let maxVal = -1;
                for (const id in statsObj) {
                    if (isRate) {
                        if (statsObj[id].games >= minGames) {
                            const val = statsObj[id][rateKey] / statsObj[id].games;
                            if (val > maxVal) { maxVal = val; best = { id, val: Math.round(val*100), games: statsObj[id].games }; }
                        }
                    } else {
                        if (statsObj[id] > maxVal) { maxVal = statsObj[id]; best = { id, val: statsObj[id] }; }
                    }
                }
                return best;
            }

            const bestDuo = getTopRelation(duoStats, true, 'wins');
            const worstEnemy = getTopRelation(enemyStats, true, 'losses');
            const bestPartner = getTopRelation(assistStats, false, null);

            // 6. 타임라인
            let timelineHtml = '';
            myGames.slice(0, 5).forEach(mg => {
                const isFriendly = mg.gameInfo.match_days.match_type === '교류전';
                const date = mg.gameInfo.match_days.match_date;
                const scoreTxt = `${mg.gameInfo.team_a_score} : ${mg.gameInfo.team_b_score}`;
                
                let resultClass = 'draw', resultText = '무승부';
                if (mg.result === 'win') { resultClass = 'win'; resultText = '승리'; }
                else if (mg.result === 'loss') { resultClass = 'loss'; resultText = '패배'; }

                let perfText = [];
                if (mg.myGoals > 0) perfText.push(`⚽ ${mg.myGoals}골`);
                if (mg.myAssists > 0) perfText.push(`👟 ${mg.myAssists}도움`);
                
                let badges = '';
                if (mg.isMom) badges += '<span class="tl-badge">⭐ MOM</span>';
                if (mg.isMip) badges += '<span class="tl-badge">📈 MIP</span>';

                timelineHtml += `
                    <div class="tl-item">
                        <div class="tl-dot ${resultClass}"></div>
                        <div class="tl-content">
                            <div class="tl-header">
                                <span class="tl-date">${date}</span>
                                <span class="tl-result stat-${resultClass === 'win' ? 'good' : (resultClass === 'loss' ? 'bad' : 'neutral')}">${resultText}</span>
                            </div>
                            <div class="tl-score">${scoreTxt}</div>
                            <div class="tl-perf">${perfText.join(' | ') || '<span style="color:#a0aec0;">공격포인트 없음</span>'}</div>
                            ${badges ? `<div class="tl-badges">${badges}</div>` : ''}
                        </div>
                    </div>
                `;
            });

            // 7. UI 조립
            document.getElementById('app').innerHTML = `
                <div class="top-nav">
                    <a href="index.html" class="back-btn">←</a>
                </div>

                <div class="hero">
                    <div class="profile-img-placeholder">${targetName.charAt(0)}</div>
                    <h1 class="player-name">${targetName}</h1>
                    <div style="font-size:14px; opacity:0.9;">FC 풉살 소속</div>
                    <div class="player-badges">${badgesHtml}</div>
                </div>

                <div class="container">
                    <div class="stat-grid">
                        <div class="stat-box"><div class="stat-val">${myStat.apps}</div><div class="stat-label">출전경기</div></div>
                        <div class="stat-box"><div class="stat-val">${myStat.goals}</div><div class="stat-label">총 득점</div></div>
                        <div class="stat-box"><div class="stat-val">${myStat.assists}</div><div class="stat-label">총 도움</div></div>
                        <div class="stat-box"><div class="stat-val">${winRate}%</div><div class="stat-label">승률</div></div>
                        <div class="stat-box"><div class="stat-val">${points}</div><div class="stat-label">공격포인트</div></div>
                        <div class="stat-box"><div class="stat-val">${p90}</div><div class="stat-label">P90 (득점력)</div></div>
                    </div>

                    <div class="card">
                        <div class="card-title">🕸️ 선수 능력치 분석</div>
                        <div class="chart-container">
                            <canvas id="radarChart"></canvas>
                        </div>
                        <p style="font-size:11px; color:#a0aec0; text-align:center; margin-top:10px;">* 해당 수치는 팀 내 데이터를 기준으로 한 상대적 지표입니다.</p>
                    </div>

                    <div class="card">
                        <div class="card-title">🤝 나의 인물 관계도 (최소 2경기)</div>
                        
                        <div class="relation-item">
                            <div class="relation-icon">🔥</div>
                            <div class="relation-info">
                                <div class="relation-title">최고의 파트너 (동반 출전 승률)</div>
                                <div class="relation-target">${bestDuo ? playersMap[bestDuo.id] : '데이터 부족'}</div>
                            </div>
                            <div class="relation-stat stat-good">${bestDuo ? `${bestDuo.val}%` : '-'}</div>
                        </div>

                        <div class="relation-item">
                            <div class="relation-icon">⚔️</div>
                            <div class="relation-info">
                                <div class="relation-title">나의 천적 (적군 조우 시 패배율)</div>
                                <div class="relation-target">${worstEnemy ? playersMap[worstEnemy.id] : '데이터 부족'}</div>
                            </div>
                            <div class="relation-stat stat-bad">${worstEnemy ? `${worstEnemy.val}%` : '-'}</div>
                        </div>

                        <div class="relation-item" style="margin-bottom:0;">
                            <div class="relation-icon">📦</div>
                            <div class="relation-info">
                                <div class="relation-title">영혼의 단짝 (단일 최다 합작)</div>
                                <div class="relation-target">${bestPartner ? playersMap[bestPartner.id] : '데이터 부족'}</div>
                            </div>
                            <div class="relation-stat stat-neutral">${bestPartner ? `${bestPartner.val}골` : '-'}</div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-title">📈 최근 경기 폼 (Top 5)</div>
                        ${myGames.length > 0 ? `<div class="timeline">${timelineHtml}</div>` : '<div style="font-size:13px; color:#a0aec0; text-align:center; padding:20px;">출전 기록이 없습니다.</div>'}
                    </div>
                </div>
            `;

            // 레이더 차트 그리기
            const ctx = document.getElementById('radarChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['결정력(Goal)', '이타성(Assist)', '승리요정(Win)', '수비력(Def)', '성실함(App)', '스타성(Star)'],
                    datasets: [{
                        label: targetName + ' 능력치',
                        data: [scoreFinishing, scorePlaymaking, scoreWinning, scoreDefense, scoreAttendance, scoreStar],
                        backgroundColor: 'rgba(49, 130, 206, 0.4)',
                        borderColor: '#3182ce',
                        pointBackgroundColor: '#2b6cb0',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#2b6cb0',
                        borderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(0,0,0,0.1)' },
                            grid: { color: 'rgba(0,0,0,0.1)' },
                            pointLabels: { font: { family: 'Pretendard', size: 12, weight: 'bold' }, color: '#4a5568' },
                            ticks: { display: false, min: 0, max: 100, stepSize: 20 }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1a202c',
                            titleFont: { family: 'Pretendard', size: 13 },
                            bodyFont: { family: 'Pretendard', size: 14, weight: 'bold' },
                            padding: 10,
                            displayColors: false,
                            callbacks: {
                                label: function(context) { return '능력치 점수: ' + context.raw; }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
